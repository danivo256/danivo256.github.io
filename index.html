<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Danivo256 • GitHub Pages</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 1.6em;
    font-weight: 600;
    border-bottom: 1px solid #111;
}

#container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
    padding: 16px;
}

.card {
    background: #050505;
    border: 1px solid #111;
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
    border-color: #333;
}

.title {
    font-size: 1.05em;
    font-weight: 600;
}

.repo {
    font-size: 0.8em;
    opacity: 0.6;
}

/* FILE PANEL */
#fileViewer {
    position: fixed;
    top: 0;
    right: -100%;
    width: 90%;
    max-width: 400px;
    height: 100%;
    background: #050505;
    border-left: 1px solid #111;
    transition: 0.3s;
    overflow-y: auto;
    z-index: 999;
}

#fileViewer.active {
    right: 0;
}

#fileHeader {
    padding: 14px;
    border-bottom: 1px solid #111;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
}

.file {
    padding: 12px;
    border-bottom: 1px solid #111;
    cursor: pointer;
}

.file:hover {
    background: #111;
}

.closeBtn {
    cursor: pointer;
    opacity: 0.6;
}
</style>
</head>
<body>

<header>danivo256 • GitHub Pages</header>

<div id="container"></div>

<div id="fileViewer">
    <div id="fileHeader">
        HTML Files
        <span class="closeBtn" onclick="closeViewer()">✕</span>
    </div>
    <div id="fileList"></div>
</div>

<script>
const user = "danivo256";
const container = document.getElementById("container");
const fileViewer = document.getElementById("fileViewer");
const fileList = document.getElementById("fileList");

function beautify(name) {
    return name.replace(/[-_]+/g, " ")
               .replace(/\b\w/g, c => c.toUpperCase());
}

async function loadRepos(page = 1, all = []) {
    const res = await fetch(`https://api.github.com/users/${user}/repos?per_page=100&page=${page}`);
    const data = await res.json();
    if (data.length === 0) return all;
    return loadRepos(page + 1, all.concat(data));
}

function closeViewer() {
    fileViewer.classList.remove("active");
    fileList.innerHTML = "";
}

async function loadHtmlFiles(repo) {
    fileList.innerHTML = "Loading...";
    fileViewer.classList.add("active");

    try {
        const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents`);
        const files = await res.json();

        fileList.innerHTML = "";

        const htmlFiles = files.filter(f => 
            f.type === "file" && f.name.endsWith(".html")
        );

        if (htmlFiles.length === 0) {
            fileList.innerHTML = "No HTML files found.";
            return;
        }

        htmlFiles.forEach(file => {
            const div = document.createElement("div");
            div.className = "file";
            div.textContent = file.name;

            div.onclick = () => {
                // ✅ OPEN GITHUB PAGES FILE (NOT GITHUB REPO)
                const url = `https://${user}.github.io/${repo}/${file.name}`;
                window.open(url, "_blank");
            };

            fileList.appendChild(div);
        });

    } catch {
        fileList.innerHTML = "Failed to load files";
    }
}

(async () => {
    const repos = await loadRepos();

    repos.forEach(repo => {
        if (!repo.has_pages) return;

        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = beautify(repo.name);

        const repoName = document.createElement("div");
        repoName.className = "repo";
        repoName.textContent = repo.name;

        card.appendChild(title);
        card.appendChild(repoName);

        card.onclick = () => {
            // ❌ REMOVED direct index.html opening
            // ✅ NOW ONLY SHOW FILE LIST
            loadHtmlFiles(repo.name);
        };

        container.appendChild(card);
    });
})();
</script>

</body>
</html>
